<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory | BUAPS Auto Sales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>BUAPS Auto Sales</h1>
    <div class="top-actions">
      <nav>
        <a href="index.html" data-i18n="navHome">Home</a>
        <a href="inventory.html" data-i18n="navInventory">Inventory</a>
        <a href="contact.html" data-i18n="navContact">Contact</a>
      </nav>
      <button id="languageToggle" class="lang-toggle" type="button">Español</button>
    </div>
  </header>

  <section class="hero">
    <h2 data-i18n="inventoryTitle">Current Inventory</h2>
    <p data-i18n="inventorySubtitle">Browse our available vehicles below</p>
  </section>

  <main class="container">
    <div class="status" id="statusMessage">Loading inventory...</div>
    <div id="inventoryContainer" class="inventory-grid"></div>
  </main>

  <footer>
    <p id="siteFooterText">© 2026 BUAPS Auto Sales | McAllen, TX</p>
  </footer>

  <script src="app.js"></script>
  <script>
    function renderInventory(cars) {
      const container = document.getElementById("inventoryContainer");
      const statusMessage = document.getElementById("statusMessage");
      const availableCars = cars.filter(isAvailable);

      if (!availableCars.length) {
        statusMessage.textContent = t("noAvailableFound");
        container.className = "";
        container.innerHTML = `<div class="empty">${t("noAvailable")}</div>`;
        return;
      }

      statusMessage.textContent = t("availableCount", availableCars.length);
      container.className = "inventory-grid";

      container.innerHTML = availableCars.map(car => {
        const stock = encodeURIComponent(car.stock || "");
        const title = `${car.year || ""} ${car.make || ""} ${car.model || ""} ${car.trim || ""}`.trim();
        const image = car.photo1 || "https://via.placeholder.com/800x500?text=No+Photo";

        return `
          <article class="car-card">
            <img src="${escapeHtml(image)}" alt="${escapeHtml(title)}">
            <div class="car-body">
              <h3 class="car-title">${escapeHtml(title)}</h3>
              <p class="car-meta">${escapeHtml(formatMileage(car.mileage || ""))}</p>
              <p class="car-meta">${t("stockNumber")}: ${escapeHtml(car.stock || "N/A")}</p>
              <div class="price">${escapeHtml(formatPrice(car.price || ""))}</div>
              <div class="btn-row">
                <a class="btn btn-primary" href="vehicle.html?stock=${stock}">${t("viewDetails")}</a>
                <a class="btn btn-secondary" href="tel:19565551234">${t("callDealer")}</a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadInventory() {
      const statusMessage = document.getElementById("statusMessage");
      const container = document.getElementById("inventoryContainer");

      statusMessage.textContent = t("loadingInventory");

      try {
        const cars = await fetchCars();
        renderInventory(cars);
      } catch (error) {
        statusMessage.textContent = t("failedLoadInventory");
        container.className = "";
        container.innerHTML = `
          <div class="error">
            ${t("failedLoadInventory")}<br><br>
            ${t("checkThat")}
            <ul>
              <li>${t("checkPublished")}</li>
              <li>${t("checkUrl")}</li>
              <li>${t("checkHeaders")}</li>
            </ul>
            <strong>Error:</strong> ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    setupLanguageToggle();
    applyCommonText();
    loadInventory();
  </script>
</body>
</html>
