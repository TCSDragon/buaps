<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Border Used Autos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Border Used Autos</h1>
    <div class="top-actions">
      <nav>
        <a href="index.html" data-i18n="navHome">Home</a>
        <a href="inventory.html" data-i18n="navInventory">Inventory</a>
        <a href="contact.html" data-i18n="navContact">Contact</a>
      </nav>
      <button id="languageToggle" class="lang-toggle" type="button">Español</button>
    </div>
  </header>

  <section
  class="hero hero-image"
  style="background-image: url('images/imgDodgeCharger_main.png');">
    <h2 data-i18n="featuredHeroTitle">Quality Used Cars at Great Prices</h2>
    <p data-i18n="featuredHeroSubtitle">Browse our inventory and find your next vehicle today</p>
    <a class="btn btn-primary" href="inventory.html" data-i18n="inventoryButton">View Inventory</a>
  </section>

  <section class="section">
    <h3 data-i18n="featuredTitle">Featured Vehicles</h3>
    <div class="status" id="featuredStatus">Loading featured vehicles...</div>
    <div class="inventory-grid" id="featuredCars"></div>
  </section>

  <section class="cta">
    <h3 data-i18n="ctaTitle">Have Questions? Call Us Today</h3>
    <p>(956) 687-5151</p>
    <a href="tel:19566875151" data-i18n="callNow">Call Now</a>
  </section>

  <footer>
    <p id="siteFooterText">© 2026 BUAPS Auto Sales | McAllen, TX</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const MAX_FEATURED = 3;

    function renderFeaturedCars(cars) {
      const status = document.getElementById("featuredStatus");
      const container = document.getElementById("featuredCars");

      const featuredCars = cars.filter(car => isAvailable(car) && isFeatured(car)).slice(0, MAX_FEATURED);

      if (!featuredCars.length) {
        status.textContent = t("noFeaturedSelected");
        container.innerHTML = `<div class="empty">${t("noFeatured")}</div>`;
        return;
      }

      status.textContent = "";
      container.innerHTML = featuredCars.map(car => {
        const stock = encodeURIComponent(car.stock || "");
        const title = `${car.year || ""} ${car.make || ""} ${car.model || ""} ${car.trim || ""}`.trim();
        const image = car.photo1 || "https://via.placeholder.com/800x500?text=No+Photo";

        return `
          <article class="car-card">
            <img src="${safeImage(image)}" alt="${escapeHtml(title)}" onerror="this.onerror=null; this.src='images/oopsIE.png';">
            <div class="car-body">
              <h4 class="car-title">${escapeHtml(title)}</h4>
              <p class="car-meta">${escapeHtml(formatMileage(car.mileage || ""))}</p>
              <div class="price">${escapeHtml(formatPrice(car.price || ""))}</div>
              <div class="btn-row">
                <a class="btn btn-primary" href="vehicle.html?stock=${stock}">${t("viewDetails")}</a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadFeaturedCars() {
      const status = document.getElementById("featuredStatus");
      const container = document.getElementById("featuredCars");

      status.textContent = t("loadingFeatured");

      try {
        const cars = await fetchCars();
        renderFeaturedCars(cars);
      } catch (error) {
        status.textContent = t("failedLoadFeatured");
        container.innerHTML = `
          <div class="error">
            ${t("failedLoadFeatured")}<br><br>
            ${t("checkThat")}
            <ul>
              <li>${t("checkPublished")}</li>
              <li>${t("checkUrl")}</li>
              <li>${t("checkFeaturedColumn")}</li>
            </ul>
            <strong>Error:</strong> ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    setupLanguageToggle();
    applyCommonText();
    loadFeaturedCars();
  </script>
</body>
</html>
