<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vehicle Details | Border Used Autos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Border Used Autos</h1>
    <div class="top-actions">
      <nav>
        <a href="index.html" data-i18n="navHome">Home</a>
        <a href="inventory.html" data-i18n="navInventory">Inventory</a>
        <a href="contact.html" data-i18n="navContact">Contact</a>
      </nav>
      <button id="languageToggle" class="lang-toggle" type="button">Español</button>
    </div>
  </header>

  <main class="container">
    <div id="pageContent">
      <div class="status-box">Loading vehicle details...</div>
    </div>
  </main>

  <footer>
    <p id="siteFooterText">© 2026 Border Used Autos | McAllen, TX</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const DEALER_PHONE_DISPLAY = "(956) 687-5151";
    const DEALER_PHONE_LINK = "19566875151";
    const DEALER_EMAIL = "sales@borderusedautos.com";

    function renderError(message) {
      document.getElementById("pageContent").innerHTML = `<div class="error">${message}</div>`;
    }

    function renderVehicle(car) {
      const container = document.getElementById("pageContent");
      const title = `${car.year || ""} ${car.make || ""} ${car.model || ""} ${car.trim || ""}`.trim();
      const photos = collectPhotos(car);
      const mainPhoto = photos[0] || "https://via.placeholder.com/1200x700?text=No+Photo";
      const features = collectFeatures(car);
      const description = car.description || t("moreInfoVehicle");

      const details = [
        [t("price"), formatPrice(car.price)],
        [t("mileage"), formatMileage(car.mileage)],
        [t("stockNumber"), car.stock || "N/A"],
        [t("vin"), car.vin || "N/A"],
        [t("exterior"), car.exterior || "N/A"],
        [t("interior"), car.interior || "N/A"],
        [t("transmission"), car.transmission || "N/A"],
        [t("drivetrain"), car.drivetrain || "N/A"],
        [t("fuel"), car.fuel || "N/A"]
      ];

      container.innerHTML = `
        <div class="vehicle-layout">
          <section>
            <div class="main-panel">
              <div class="main-image-wrap">
                <img id="mainVehicleImage" class="main-image" src="${safeImage(mainPhoto)}" alt="${escapeHtml(title)}" onerror="this.onerror=null; this.src='images/oopsIE.png';">
              </div>

              ${photos.length > 1 ? `
                <div class="thumb-grid">
                  ${photos.map((photo, index) => `
                    <button class="thumb ${index === 0 ? "active" : ""}" data-photo="${safeImage(photo)}" type="button">
                      <img id="mainVehicleImage" class="main-image" src="${safeImage(photo)}" alt="Vehicle photo ${index + 1} onerror="this.onerror=null; this.src='images/oopsIE.png';">
                    </button>
                  `).join("")}
                </div>
              ` : ""}

              <div class="vehicle-summary">
                <h1 class="vehicle-title">${escapeHtml(title)}</h1>
                <div class="price">${escapeHtml(formatPrice(car.price))}</div>
                <p class="summary-meta">${escapeHtml(formatMileage(car.mileage))}</p>
                <p class="summary-meta">${t("stockNumber")}: ${escapeHtml(car.stock || "N/A")}</p>
              </div>
            </div>

            <div class="section-card">
              <h3>${t("vehicleDescription")}</h3>
              <div class="description">${escapeHtml(description)}</div>
            </div>

            ${features.length ? `
              <div class="section-card">
                <h3>${t("features")}</h3>
                <ul class="feature-list">
                  ${features.map(feature => `<li>${escapeHtml(feature)}</li>`).join("")}
                </ul>
              </div>
            ` : ""}
          </section>

          <aside class="side-panel">
            <h2>${t("vehicleDetails")}</h2>
            ${details.map(([label, value]) => `
              <div class="detail-row">
                <div class="detail-label">${escapeHtml(label)}</div>
                <div class="detail-value">${escapeHtml(value)}</div>
              </div>
            `).join("")}

            <div class="btn-group">
              <a class="btn btn-primary" href="tel:${DEALER_PHONE_LINK}">${t("callNow")} ${escapeHtml(DEALER_PHONE_DISPLAY)}</a>
              <a class="btn btn-secondary" href="mailto:${escapeHtml(DEALER_EMAIL)}?subject=${encodeURIComponent(t("askAboutSubject", car.stock || ""))}">${t("emailAboutCar")}</a>
              <a class="btn btn-light" href="inventory.html">${t("backToInventory")}</a>
            </div>
          </aside>
        </div>
      `;

      document.title = `${title} | Border Used Autos`;

      const thumbButtons = document.querySelectorAll(".thumb");
      const mainImage = document.getElementById("mainVehicleImage");

      thumbButtons.forEach(button => {
        button.addEventListener("click", () => {
          thumbButtons.forEach(btn => btn.classList.remove("active"));
          button.classList.add("active");
          mainImage.src = button.dataset.photo;
        });
      });
    }

    async function loadVehicle() {
      const stock = getQueryParam("stock");
      const content = document.getElementById("pageContent");

      content.innerHTML = `<div class="status-box">${t("loadingVehicle")}</div>`;

      if (!stock) {
        renderError(`
          ${t("vehicleNotSpecified")}<br><br>
          ${t("vehicleOpenExample")}<br>
          <strong>vehicle.html?stock=101</strong>
        `);
        return;
      }

      try {
        const cars = await fetchCars();
        const car = cars.find(row => String(row.stock).trim() === String(stock).trim());

        if (!car) {
          renderError(`
            ${t("vehicleNotFound", escapeHtml(stock))}<br><br>
            <a href="inventory.html">${t("returnToInventory")}</a>
          `);
          return;
        }

        renderVehicle(car);
      } catch (error) {
        renderError(`
          ${t("failedLoadVehicle")}<br><br>
          ${t("checkThat")}
          <ul>
            <li>${t("checkPublished")}</li>
            <li>${t("checkUrl")}</li>
            <li>${t("checkStockExists")}</li>
          </ul>
          <strong>Error:</strong> ${escapeHtml(error.message)}
        `);
      }
    }

    setupLanguageToggle();
    applyCommonText();
    loadVehicle();
  </script>
</body>
</html>
